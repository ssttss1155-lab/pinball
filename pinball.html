<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>PINBALL</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{background:#111;overflow:hidden;touch-action:none;font-family:monospace;}
#wrap{display:flex;flex-direction:column;width:100vw;height:100vh;}
#hud{display:flex;justify-content:space-between;align-items:center;
     padding:5px 14px;background:#000;border-bottom:2px solid #333;flex-shrink:0;}
#score{font-size:20px;font-weight:bold;color:#ff0;letter-spacing:3px;}
#lives{font-size:18px;color:#0ff;letter-spacing:2px;}
#cv{display:block;flex:1;}
#btns{display:flex;flex-shrink:0;background:#000;border-top:2px solid #333;}
.btn{flex:1;height:64px;color:#fff;font-family:monospace;font-size:13px;
     font-weight:bold;letter-spacing:1px;border:none;cursor:pointer;
     -webkit-tap-highlight-color:transparent;outline:none;}
#btnL{background:#1a3a7a;}
#btnR{background:#1a3a7a;}
#btnM{flex:.6;background:#5a0000;color:#faa;}
.btn:active{filter:brightness(1.5);}
</style>

<body>
<div id="wrap">
  <div id="hud">
    <span id="score">000000</span>
    <span id="lives">&#9679;&#9679;&#9679;</span>
  </div>
  <canvas id="cv"></canvas>
  <div id="btns">
    <button class="btn" id="btnL">&#9668; LEFT</button>
    <button class="btn" id="btnM">&#9650; LAUNCH</button>
    <button class="btn" id="btnR">RIGHT &#9658;</button>
  </div>
</div>
<script>
// ===== Audio =====
var AC=null;
function getAC(){if(!AC){try{AC=new(window.AudioContext||window.webkitAudioContext)();}catch(e){}}return AC;}
function resumeAC(){var a=getAC();if(a&&a.state==='suspended')a.resume();}
function beep(f,d,v,t){var a=getAC();if(!a)return;try{var o=a.createOscillator(),g=a.createGain();o.connect(g);g.connect(a.destination);o.type=t||'square';o.frequency.value=f;g.gain.setValueAtTime(v||0.1,a.currentTime);g.gain.exponentialRampToValueAtTime(0.001,a.currentTime+d);o.start();o.stop(a.currentTime+d);}catch(e){}}
function noise(d,v){var a=getAC();if(!a)return;try{var l=Math.floor(a.sampleRate*d),b=a.createBuffer(1,l,a.sampleRate),da=b.getChannelData(0);for(var i=0;i<l;i++)da[i]=Math.random()*2-1;var s=a.createBufferSource(),g=a.createGain();s.buffer=b;s.connect(g);g.connect(a.destination);g.gain.setValueAtTime(v||0.1,a.currentTime);g.gain.exponentialRampToValueAtTime(0.001,a.currentTime+d);s.start();s.stop(a.currentTime+d);}catch(e){}}
function sfxFlip(){beep(220,0.06,0.12,'square');}
function sfxWall(){noise(0.04,0.09);}
function sfxBump(pts){beep(pts>=1000?1100:pts>=500?880:pts>=200?660:440,0.12,0.18,'square');}
function sfxLost(){beep(300,0.12,0.18,'sawtooth');setTimeout(function(){beep(180,0.25,0.18,'sawtooth');},130);}
function sfxOver(){beep(440,0.1,0.18,'square');setTimeout(function(){beep(330,0.1,0.18,'square');},120);setTimeout(function(){beep(220,0.1,0.18,'square');},240);setTimeout(function(){beep(110,0.3,0.18,'sawtooth');},370);}
function sfxStart(){beep(330,0.07,0.13,'square');setTimeout(function(){beep(440,0.07,0.13,'square');},90);setTimeout(function(){beep(550,0.12,0.13,'square');},180);}

// ===== Canvas / Layout =====
var cv=document.getElementById('cv');
var ctx=cv.getContext('2d');
var W=0,H=0;

// ===== Game params (EASY) =====
var GRAVITY   = 0.15;
var MAX_SPD   = 14;
var LAUNCH_V  = 10;
var BR        = 11;  // ball radius (big)
var LIVES_MAX = 3;

// ===== State =====
var score=0,lives=LIVES_MAX,combo=0;
var mode='start'; // start play lost over
var fr=0;
var bx=0,by=0,bvx=0,bvy=0;
var FLEN=0;
var lfx=0,lfy=0,rfx=0,rfy=0;
var lfa=0,rfa=0,lfaP=0,rfaP=0;
var LR=0.35,LU=-0.35,RR=0,RU=0;
var pressL=false,pressR=false,prevF=false;
var bumpers=[],parts=[];
var wallCD=0,flipCD=0;
var msgA='PINBALL',msgB='LAUNCH を押してスタート';

var scoreEl=document.getElementById('score');
var livesEl=document.getElementById('lives');
function fmt(n){return('000000'+n).slice(-6);}
function hearts(n){var s='';for(var i=0;i<n;i++)s+='\u25cf';return s;}

// ===== Field geometry (oval wall path) =====
// The playfield is an oval inset from the canvas
var FX=0,FY=0,FW=0,FH=0; // field rect
var WALL=0; // wall thickness in px

function setup(){
  W=cv.clientWidth; H=cv.clientHeight;
  cv.width=W; cv.height=H;
  WALL=Math.round(W*0.10);
  FX=WALL; FY=Math.round(H*0.02);
  FW=W-WALL*2; FH=H-Math.round(H*0.04);

  FLEN=Math.min(FW*0.36,108);
  var mid=W/2, fy=FY+FH-Math.round(FH*0.07);
  var gap=FLEN-4;
  lfx=mid-gap; lfy=fy;
  rfx=mid+gap; rfy=fy;
  RR=Math.PI-0.35; RU=Math.PI+0.35;
  lfa=LR; rfa=RR; lfaP=lfa; rfaP=rfa;

  // bumpers
  var cx=W/2, sp=FW*0.22;
  var top=FY+FH*0.14, mid2=FY+FH*0.30;
  bumpers=[
    // top center (1000)
    {x:cx,     y:FY+FH*0.10, r:20, pts:1000, col:'#ff88cc', fl:0},
    // mid row (500)
    {x:cx-sp,  y:FY+FH*0.22, r:16, pts:500,  col:'#88aaff', fl:0},
    {x:cx+sp,  y:FY+FH*0.22, r:16, pts:500,  col:'#88aaff', fl:0},
    // lower (200)
    {x:cx,     y:FY+FH*0.36, r:20, pts:200,  col:'#ff88aa', fl:0},
    // side small (100)
    {x:cx-sp*0.5, y:FY+FH*0.50, r:13, pts:100, col:'#aaffcc', fl:0},
    {x:cx+sp*0.5, y:FY+FH*0.50, r:13, pts:100, col:'#aaffcc', fl:0},
  ];

  bx=W/2; by=lfy-60; bvx=0; bvy=0;
  wallCD=0; flipCD=0; parts=[];
}

// ===== Oval wall collision =====
// Returns true if point (px,py) is inside the oval playfield
function inField(px,py){
  var cx=FX+FW/2, cy=FY+FH/2;
  var rx=FW/2, ry=FH/2;
  var dx=(px-cx)/rx, dy=(py-cy)/ry;
  return dx*dx+dy*dy<=1.0;
}

// Push ball back inside oval; return true if collision
function ovalCollide(){
  var cx=FX+FW/2, cy=FY+FH/2;
  var rx=FW/2-BR*0.5, ry=FH/2-BR*0.5;
  var dx=(bx-cx)/rx, dy=(by-cy)/ry;
  var dist=Math.sqrt(dx*dx+dy*dy);
  if(dist>=1.0){
    // normal pointing inward
    var nx=(cx-bx), ny=(cy-by);
    var nl=Math.sqrt(nx*nx+ny*ny);
    if(nl<0.001)return false;
    nx/=nl; ny/=nl;
    // push back inside
    var penetration=(dist-1.0);
    bx+=nx*penetration*rx*0.6;
    by+=ny*penetration*ry*0.6;
    // reflect
    var dot=bvx*(-nx)+bvy*(-ny);
    if(dot>0){
      bvx+=2*dot*nx; bvy+=2*dot*ny;
      var spd=Math.sqrt(bvx*bvx+bvy*bvy);
      if(spd>MAX_SPD){bvx*=MAX_SPD/spd;bvy*=MAX_SPD/spd;}
      if(wallCD<=0){sfxWall();wallCD=8;}
    }
    return true;
  }
  return false;
}

// ===== Flipper collision =====
function nearPt(px,py,ax,ay,ex,ey){
  var dx=ex-ax,dy=ey-ay,l2=dx*dx+dy*dy;
  if(l2<0.001)return{x:ax,y:ay};
  var t=((px-ax)*dx+(py-ay)*dy)/l2;
  t=t<0?0:t>1?1:t;
  return{x:ax+t*dx,y:ay+t*dy};
}
function flipHit(fa,fx,fy2,av,boost){
  var ex=fx+FLEN*Math.cos(fa),ey=fy2+FLEN*Math.sin(fa);
  var cp=nearPt(bx,by,fx,fy2,ex,ey);
  var dx=bx-cp.x,dy=by-cp.y,d=Math.sqrt(dx*dx+dy*dy),md=BR+8;
  if(d<md&&d>0.01){
    var nx=dx/d,ny=dy/d;
    bx+=nx*(md-d);by+=ny*(md-d);
    var dot=bvx*nx+bvy*ny;
    if(dot<0){
      if(Math.abs(av)>0.008){
        bvx-=1.65*dot*nx;bvy-=1.65*dot*ny;
        if(boost)bvy-=4.5;
        var spd=Math.sqrt(bvx*bvx+bvy*bvy);
        if(spd>MAX_SPD){bvx*=MAX_SPD/spd;bvy*=MAX_SPD/spd;}
        if(flipCD<=0){sfxFlip();flipCD=6;}
      }else{
        bvx-=dot*nx*0.25;bvy-=dot*ny*0.25;
        bvx+=(-ny)*0.06;bvy+=nx*0.06;
      }
    }
  }
}

// ===== Particles =====
function addParts(x,y,col){
  for(var i=0;i<12;i++){
    var a=Math.random()*Math.PI*2,s=2+Math.random()*5;
    parts.push({x:x,y:y,vx:Math.cos(a)*s,vy:Math.sin(a)*s,life:1,col:col,r:2+Math.random()*2});
  }
}

// ===== Update =====
function update(){
  fr++;
  if(wallCD>0)wallCD--;
  if(flipCD>0)flipCD--;
  lfaP=lfa;rfaP=rfa;
  lfa+=((pressL?LU:LR)-lfa)*0.28;
  rfa+=((pressR?RU:RR)-rfa)*0.28;
  var lafV=lfa-lfaP,rafV=rfa-rfaP;

  for(var i=parts.length-1;i>=0;i--){
    var p=parts[i];p.x+=p.vx;p.y+=p.vy;p.vy+=0.12;p.life-=0.045;
    if(p.life<=0)parts.splice(i,1);
  }
  for(var j=0;j<bumpers.length;j++)if(bumpers[j].fl>0)bumpers[j].fl--;

  if(mode!=='play')return;

  bvy+=GRAVITY; bx+=bvx; by+=bvy;
  var spd0=Math.sqrt(bvx*bvx+bvy*bvy);
  if(spd0>MAX_SPD){bvx*=MAX_SPD/spd0;bvy*=MAX_SPD/spd0;}

  ovalCollide();

  // bumpers
  for(var j=0;j<bumpers.length;j++){
    var b=bumpers[j];
    var dx=bx-b.x,dy=by-b.y,d=Math.sqrt(dx*dx+dy*dy),md=BR+b.r;
    if(d<md&&d>0.01){
      var nx=dx/d,ny=dy/d;
      bx=b.x+nx*md;by=b.y+ny*md;
      var dot=bvx*nx+bvy*ny;
      bvx-=2*dot*nx;bvy-=2*dot*ny;
      var spd=Math.sqrt(bvx*bvx+bvy*bvy);
      var minS=6,maxS=12;
      if(spd<minS){bvx=nx*minS;bvy=ny*minS;}
      if(spd>maxS){bvx*=maxS/spd;bvy*=maxS/spd;}
      b.fl=18;combo=Math.min(combo+1,9);
      score+=(b.pts*(1+combo));scoreEl.textContent=fmt(score);
      sfxBump(b.pts);addParts(b.x,b.y,b.col);
    }
  }

  flipHit(lfa,lfx,lfy,lafV,pressL);
  flipHit(rfa,rfx,rfy,rafV,pressR);

  // ball lost (below flippers)
  if(by>lfy+BR*3){
    lives--;combo=0;
    livesEl.textContent=hearts(Math.max(0,lives));
    if(lives<=0){sfxOver();mode='over';msgA='GAME OVER';msgB='SCORE: '+fmt(score);}
    else{sfxLost();mode='lost';msgA='BALL LOST';msgB='LAUNCH を押して再開';bx=W/2;by=lfy-60;bvx=0;bvy=0;}
  }
}

// ===== Draw =====

// Oval clipping path
function ovalPath(){
  ctx.beginPath();
  ctx.ellipse(FX+FW/2,FY+FH/2,FW/2,FH/2,0,0,Math.PI*2);
}

function drawField(){
  // Background outside oval = dark maroon wall
  ctx.fillStyle='#3a0a18';
  ctx.fillRect(0,0,W,H);

  // Oval interior = dark play surface
  ctx.save();
  ovalPath();
  ctx.clip();
  ctx.fillStyle='#0a0a0f';
  ctx.fill();

  // Subtle lane guides
  ctx.strokeStyle='rgba(255,255,255,0.04)';
  ctx.lineWidth=1;
  for(var xi=FX+10;xi<FX+FW;xi+=28){
    ctx.beginPath();ctx.moveTo(xi,FY);ctx.lineTo(xi,FY+FH);ctx.stroke();
  }
  ctx.restore();

  // Oval border
  ovalPath();
  ctx.strokeStyle='#884466';
  ctx.lineWidth=6;
  ctx.stroke();
  ctx.strokeStyle='#cc6688';
  ctx.lineWidth=2;
  ctx.stroke();

  // Side decoration dots (left)
  var dotX=FX-WALL*0.4, dotStep=FH*0.06;
  ctx.fillStyle='#cc8844';
  for(var k=0;k<5;k++){
    var yk=FY+FH*0.2+k*dotStep;
    ctx.beginPath();ctx.arc(dotX,yk,5,0,Math.PI*2);ctx.fill();
  }
}

function drawBumper(b){
  var lit=b.fl>0;
  // outer ring
  ctx.shadowColor=b.col;ctx.shadowBlur=lit?28:8;
  ctx.beginPath();ctx.arc(b.x,b.y,b.r,0,Math.PI*2);
  ctx.fillStyle=lit?b.col:'#222';ctx.fill();
  ctx.strokeStyle=b.col;ctx.lineWidth=2.5;ctx.stroke();
  // inner dot
  ctx.beginPath();ctx.arc(b.x,b.y,b.r*0.45,0,Math.PI*2);
  ctx.fillStyle=lit?'#fff':b.col+'55';ctx.fill();
  ctx.shadowBlur=0;
  // score label
  ctx.fillStyle=lit?'#fff':'#ccc';
  ctx.font='bold '+(b.r*0.72)+'px monospace';
  ctx.textAlign='center';ctx.textBaseline='middle';
  ctx.fillText(b.pts,b.x,b.y+b.r+10);
}

function drawPenguins(){
  // Draw ninja image in center of field
  var cx=W/2;
  var py=lfy-FH*0.24;
  var sz=Math.min(FW*0.22,80);
  if(ninjaImg.complete&&ninjaImg.naturalWidth>0){
    ctx.save();
    // subtle bob animation
    var bob=Math.sin(fr*0.04)*3;
    ctx.drawImage(ninjaImg,cx-sz/2,py-sz/2+bob,sz,sz);
    ctx.restore();
  }
}

  ctx.shadowColor='#4499ff';ctx.shadowBlur=active?20:6;
  ctx.lineWidth=18;ctx.strokeStyle=active?'#2255aa':'#112244';
  ctx.beginPath();ctx.moveTo(fx,fy2);ctx.lineTo(ex,ey);ctx.stroke();
  ctx.lineWidth=12;ctx.strokeStyle=active?'#4488ee':'#1a3a7a';
  ctx.beginPath();ctx.moveTo(fx,fy2);ctx.lineTo(ex,ey);ctx.stroke();
  ctx.lineWidth=3;ctx.strokeStyle=active?'#88ccff':'#336699';
  ctx.beginPath();ctx.moveTo(fx,fy2);ctx.lineTo(ex,ey);ctx.stroke();
  ctx.fillStyle='#4499ff';ctx.shadowColor='#4499ff';ctx.shadowBlur=8;
  ctx.beginPath();ctx.arc(fx,fy2,6,0,Math.PI*2);ctx.fill();
  ctx.shadowBlur=0;
}

function drawBall(){
  ctx.shadowColor='#aaddff';ctx.shadowBlur=14;
  var g=ctx.createRadialGradient(bx-3,by-4,2,bx,by,BR);
  g.addColorStop(0,'#ffffff');
  g.addColorStop(0.4,'#ffccee');
  g.addColorStop(1,'#cc4488');
  ctx.beginPath();ctx.arc(bx,by,BR,0,Math.PI*2);
  ctx.fillStyle=g;ctx.fill();ctx.shadowBlur=0;
}

function drawParts(){
  for(var i=0;i<parts.length;i++){
    var p=parts[i];
    ctx.globalAlpha=p.life;
    ctx.beginPath();ctx.arc(p.x,p.y,p.r*p.life,0,Math.PI*2);
    ctx.fillStyle=p.col;ctx.fill();
  }
  ctx.globalAlpha=1;
}

function drawOverlay(){
  if(mode==='play')return;
  ctx.fillStyle='rgba(3,2,12,0.88)';ctx.fillRect(0,0,W,H);
  ctx.textAlign='center';ctx.textBaseline='middle';
  ctx.shadowColor='#ff88cc';ctx.shadowBlur=20;
  ctx.fillStyle='#ff88cc';ctx.font='bold 30px monospace';
  ctx.fillText(msgA,W/2,H/2-30);ctx.shadowBlur=0;
  var a=0.3+0.7*Math.abs(Math.sin(fr*0.04));
  ctx.fillStyle='rgba(180,160,200,'+a+')';ctx.font='12px monospace';
  ctx.fillText(msgB,W/2,H/2+16);
}

function drawCombo(){
  if(combo>1&&mode==='play'){
    var a=0.4+0.5*Math.abs(Math.sin(fr*0.18));
    ctx.fillStyle='rgba(255,220,0,'+a+')';
    ctx.font='bold 13px monospace';
    ctx.textAlign='center';ctx.textBaseline='middle';
    ctx.fillText('x'+combo+' COMBO',W/2,lfy-FH*0.12);
  }
}

function draw(){
  drawField();

  ctx.save();
  ovalPath();ctx.clip();

  for(var j=0;j<bumpers.length;j++)drawBumper(bumpers[j]);
  drawPenguins();
  drawParts();
  drawFlipperShape(lfa,lfx,lfy,pressL);
  drawFlipperShape(rfa,rfx,rfy,pressR);
  drawBall();
  drawCombo();

  ctx.restore();

  drawOverlay();
}

function loop(){update();draw();requestAnimationFrame(loop);}

// ===== Controls =====
function fire(){
  resumeAC();
  if(mode==='over'){
    score=0;lives=LIVES_MAX;combo=0;parts=[];
    scoreEl.textContent='000000';livesEl.textContent=hearts(LIVES_MAX);
    setup();mode='start';msgA='PINBALL';msgB='LAUNCH を押してスタート';return;
  }
  if(mode==='start'||mode==='lost'){
    sfxStart();
    bvx=(Math.random()-0.5)*1.8;bvy=-LAUNCH_V;mode='play';
  }
}
function setL(v){if(v&&!pressL)resumeAC();pressL=v;}
function setR(v){if(v&&!pressR)resumeAC();pressR=v;}

var btnL=document.getElementById('btnL'),btnR=document.getElementById('btnR'),btnM=document.getElementById('btnM');
function addB(el,fn){
  el.addEventListener('touchstart',function(e){e.preventDefault();fn(true);},{passive:false});
  el.addEventListener('touchend',  function(e){e.preventDefault();fn(false);},{passive:false});
  el.addEventListener('touchcancel',function(e){e.preventDefault();fn(false);},{passive:false});
  el.addEventListener('mousedown', function(){fn(true);});
  el.addEventListener('mouseup',   function(){fn(false);});
  el.addEventListener('mouseleave',function(){fn(false);});
}
addB(btnL,setL);addB(btnR,setR);
btnM.addEventListener('touchstart',function(e){e.preventDefault();fire();},{passive:false});
btnM.addEventListener('click',fire);
document.addEventListener('keydown',function(e){
  if(e.key==='ArrowLeft'||e.key==='z')setL(true);
  if(e.key==='ArrowRight'||e.key==='/')setR(true);
  if(e.key===' '){e.preventDefault();fire();}
});
document.addEventListener('keyup',function(e){
  if(e.key==='ArrowLeft'||e.key==='z')setL(false);
  if(e.key==='ArrowRight'||e.key==='/')setR(false);
});

setup();
loop();
</script>
</body>
</html>
